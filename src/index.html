---
title: Kids-N-Motion, Pediatric Therapy
layout: default
---

<div class="video-wrapper bg-blue bg-extend">
  <video controls muted loop>
    <source
      src="/public/assets/video/kids-n-motion-full.mp4#t=1"
      type="video/mp4"
    />
    <track
      src="/public/assets/video/captions-en.vtt"
      kind="captions"
      srclang="en"
      label="english-captions"
    />
  </video>
</div>

<!-- -->

{% for main_banner in site.data.main_banners %}
<section class="banner-wrapper bg-extend {{ main_banner.bg_class }}">
  <div class="banner {{ main_banner.reverse }}">
    <picture class="banner-img">
      <source srcset="{{ main_banner.image_src }}" />
      <img src="{{ main_banner.image_src }}" alt="{{  }}" />
    </picture>

    <div class="banner-content">
      <h2 class="{{ main_banner.h2_class }}">{{ main_banner.heading }}</h2>
      {{ main_banner.content }}
    </div>
  </div>
</section>
{% endfor %}
